<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presenter – Sprechernotizen</title>
  <link rel="stylesheet" href="presenter.css">
</head>
<body>
  <header class="presenter-header">
    <div class="presenter-header__top">
      <p class="presenter-header__meta" id="slideMeta">Folie — / —</p>
      <time id="presenterTimer" class="presenter-timer" hidden aria-hidden="true">00:00</time>
    </div>
    <h1 class="presenter-header__title" id="slideTitle">Warte auf Präsentation …</h1>
  </header>

  <main class="presenter-main">
    <section class="presenter-notes">
      <h2 class="presenter-notes__heading">Sprechernotiz</h2>
      <div id="notesText" class="presenter-notes__body">Bitte Präsentation im anderen Fenster öffnen.</div>
    </section>

    <div class="presenter-jump">
      <label for="slideJump">Direkt zu Folie</label>
      <select id="slideJump" aria-label="Folie auswählen"></select>
    </div>

    <section class="presenter-extra" id="presenterExtra" hidden>
      <section class="presenter-extra__block" id="glossaryBlock" hidden>
        <h2 class="presenter-extra__heading">Fachbegriffe</h2>
        <dl class="presenter-glossary" id="glossaryList"></dl>
      </section>
      <section class="presenter-extra__block" id="faqBlock" hidden>
        <h2 class="presenter-extra__heading">Mögliche Folgefragen</h2>
        <div class="presenter-faq" id="faqList"></div>
      </section>
    </section>
  </main>

  <nav class="presenter-nav" aria-label="Foliennavigation">
    <button type="button" id="prevBtn">← Zurück</button>
    <button type="button" id="fullscreenBtn">Vollbild</button>
    <button type="button" id="nextBtn">Weiter →</button>
  </nav>

  <script src="presenter-guide.js"></script>
  <script src="presenter.js"></script>
</body>
</html>
